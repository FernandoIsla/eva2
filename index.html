<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeslaSys Chile - Soporte Técnico</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav class="top-nav">
        <div class="nav-wrapper">
            <div class="brand">
                <span class="logo-dot"></span>
                <span class="brand-name">TeslaSys Chile</span>
            </div>
            <div class="app-title">Sistema de Registro de Solicitudes de Soporte</div>

            <div class="nav-controls">
                <button type="button" id="btn-theme" class="btn-theme-toggle">
                    <span id="theme-text">Modo Claro</span>
                </button>
                <div class="user-badge">Soporte TI</div>
            </div>
        </div>
    </nav>

    <main class="portal-layout">

        <aside class="sidebar-form">
            <div class="form-card">
                <div class="form-header">
                    <h2>Nueva Solicitud de Soporte</h2>
                </div>

                <form id="form-solicitud" novalidate>
                    <div class="input-stack">
                        <div class="field">
                            <label for="nombre">Nombre del colaborador</label>
                            <input type="text" id="nombre" placeholder="Ej. Fernando Isla">
                        </div>

                        <div class="field">
                            <label for="correo">Correo electrónico</label>
                            <input type="email" id="correo" placeholder="Ingresa tu correo electrónico">
                        </div>

                        <div class="field">
                            <label for="area">Área de trabajo</label>
                            <input type="text" id="area" placeholder="Ingresa el área de trabajo">
                        </div>

                        <div class="field">
                            <label for="tipo">Tipo de solicitud</label>
                            <select id="tipo">
                                <option value="">Seleccione una opción</option>
                                <option value="Hardware">Hardware</option>
                                <option value="Software">Software</option>
                                <option value="Redes">Redes</option>
                                <option value="Seguridad">Seguridad</option>
                            </select>
                        </div>

                        <div class="field">
                            <label for="descripcion">Descripción del problema</label>
                            <textarea id="descripcion" rows="3"
                                placeholder="Describe el problema que presentas..."></textarea>
                        </div>
                    </div>

                    <div id="mensaje-feedback" class="msg-box hidden"></div>

                    <div class="form-actions">
                        <button type="button" id="btn-registrar" class="btn-action primary">Registrar Solicitud</button>
                        <button type="button" id="btn-limpiar" class="btn-action secondary">Limpiar Formulario</button>
                    </div>
                </form>
            </div>
        </aside>

        <section class="main-content">
            <div class="content-card">
                <div class="content-header">
                    <h2>Solicitudes Registradas</h2>
                    <div class="counter-badge">
                        Total de solicitudes registradas: <span id="contador-total">0</span>
                    </div>
                </div>

                <div class="table-container">
                    <table id="tabla-solicitudes">
                        <thead>
                            <tr>
                                <th style="width: 50px;">N°</th>
                                <th>Nombre</th>
                                <th>Área</th>
                                <th>Tipo de Solicitud</th>
                                <th>Descripción</th>
                            </tr>
                        </thead>
                        <tbody id="lista-solicitudes">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>

</html>
